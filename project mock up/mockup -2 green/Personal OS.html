<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    :root {
      /* Backgrounds */
      --bg:       #0c0c16;
      --surface:  #12121f;
      --surface2: #181828;
      --surface3: #1e1e30;
      /* Borders */
      --border:   rgba(255,255,255,0.07);
      --border2:  rgba(255,255,255,0.13);
      /* Text */
      --t1: #f0f0fa;
      --t2: #9090b0;
      --t3: #5c5c7a;
      /* Accents */
      --purple:    #7c5cfc;
      --purple-d:  #5a3fd4;
      --purple-g:  rgba(124,92,252,0.28);
      --green:     #22c55e;
      --green-d:   #16a34a;
      --green-g:   rgba(34,197,94,0.22);
      --teal:      #0ea5e9;
      --teal-g:    rgba(14,165,233,0.20);
      --orange:    #f97316;
      --orange-g:  rgba(249,115,22,0.22);
      --pink:      #ec4899;
      --pink-g:    rgba(236,72,153,0.20);
      /* Sidebar */
      --sidebar-w: 220px;
      --header-h:  64px;
      /* Typography */
      --font: 'Plus Jakarta Sans', system-ui, sans-serif;
      /* Radius */
      --r:  14px;
      --rs: 10px;

      /* ── Compat aliases for older components ── */
      --bg-900: var(--bg);
      --bg-800: var(--surface);
      --bg-700: var(--surface2);
      --bg-600: var(--surface2);
      --bg-500: var(--surface3);
      --text-100: var(--t1);
      --text-200: var(--t2);
      --text-300: var(--t2);
      --text-400: var(--t3);
      --gold-300: var(--purple);
      --gold-400: var(--purple);
      --gold-500: var(--purple-d);
      --gold-glow: var(--purple-g);
      --violet-400: var(--teal);
      --violet-glow: var(--teal-g);
      --rose-400: #ef4444;
      --glass: rgba(18,18,31,0.85);
      --glass-border: var(--border2);
      --radius: var(--r);
      --radius-sm: var(--rs);
      --font-display: var(--font);
      --font-ui: var(--font);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: var(--bg);
      color: var(--t1);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 4px; }

    /* Utilities */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }
    .card2 {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r);
    }
    .fade-in { animation: fadeIn 0.4s ease both; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse {
      0%,100% { opacity:1; } 50% { opacity:0.4; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); } to { transform: rotate(360deg); }
    }
    @keyframes float1 {
      0%,100% { transform:translateY(0px); }
      50%      { transform:translateY(-14px); }
    }
    @keyframes float2 {
      0%,100% { transform:translateY(0px); }
      50%      { transform:translateY(-8px); }
    }

    /* Gradient text */
    .grad-text {
      background: linear-gradient(135deg, var(--purple), var(--teal));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Ambient orbs */
    .orb-layer { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; }
    .orb { position:absolute; border-radius:50%; filter:blur(110px); }
    .orb-p { width:600px;height:600px; background:rgba(124,92,252,0.10); top:-15%;left:-10%; animation:float1 28s ease-in-out infinite; }
    .orb-g { width:500px;height:500px; background:rgba(34,197,94,0.07); bottom:-10%;right:-8%; animation:float2 36s ease-in-out infinite; }
    .orb-t { width:400px;height:400px; background:rgba(14,165,233,0.07); top:40%;left:30%; animation:float1 44s ease-in-out infinite; }

    /* Tweaks panel */
    #tweaks-panel {
      display:none;
      position:fixed;
      bottom:24px;right:24px;
      width:250px;
      z-index:9999;
      padding:20px;
      background:rgba(18,18,31,0.97);
      border:1px solid var(--border2);
      border-radius:var(--r);
      backdrop-filter:blur(20px);
    }
    #tweaks-panel.active { display:block; }
    .tw-title { font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--t3);margin-bottom:16px; }
    .tw-row { margin-bottom:14px; }
    .tw-label { font-size:11px;color:var(--t2);margin-bottom:6px; }
    .tw-row select, .tw-row input[type=range] { width:100%;background:var(--surface2);border:1px solid var(--border2);color:var(--t1);padding:6px 8px;border-radius:6px;font-family:var(--font);font-size:12px;outline:none; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Landing.jsx"></script>
  <script type="text/babel" src="components/Login.jsx"></script>
  <script type="text/babel" src="components/Overview.jsx"></script>
  <script type="text/babel" src="components/Journal.jsx"></script>
  <script type="text/babel" src="components/OtherSections.jsx"></script>
  <script type="text/babel" src="components/AppShell.jsx"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "accentColor": "green",
      "density": "spacious",
      "sidebarWidth": 260
    }/*EDITMODE-END*/;

    const ACCENT_MAP = {
      purple: { primary:'#7c5cfc', glow:'rgba(124,92,252,0.28)' },
      green:  { primary:'#22c55e', glow:'rgba(34,197,94,0.22)' },
      teal:   { primary:'#0ea5e9', glow:'rgba(14,165,233,0.20)' },
      orange: { primary:'#f97316', glow:'rgba(249,115,22,0.22)' },
    };

    const App = () => {
      const [page, setPage] = React.useState(() => localStorage.getItem('pos_page') || 'landing');
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
      const [tweaksOpen, setTweaksOpen] = React.useState(false);

      const navigate = p => { localStorage.setItem('pos_page', p); setPage(p); };

      React.useEffect(() => {
        const ac = ACCENT_MAP[tweaks.accentColor] || ACCENT_MAP.purple;
        document.documentElement.style.setProperty('--purple', ac.primary);
        document.documentElement.style.setProperty('--purple-g', ac.glow);
        document.documentElement.style.setProperty('--sidebar-w', tweaks.sidebarWidth + 'px');
      }, [tweaks]);

      React.useEffect(() => {
        window.addEventListener('message', e => {
          if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
          if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
        });
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
      }, []);

      const handleTweak = (k, v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      };

      return (
        <>
          {page === 'landing' && <LandingPage navigate={navigate} />}
          {page === 'login'   && <LoginPage navigate={navigate} />}
          {page !== 'landing' && page !== 'login' && <AppShell page={page} navigate={navigate} />}

          <div id="tweaks-panel" className={tweaksOpen ? 'active' : ''}>
            <div className="tw-title">Tweaks</div>
            <div className="tw-row">
              <div className="tw-label">Accent color</div>
              <select value={tweaks.accentColor} onChange={e => handleTweak('accentColor', e.target.value)}>
                <option value="purple">Purple</option>
                <option value="green">Green</option>
                <option value="teal">Teal</option>
                <option value="orange">Orange</option>
              </select>
            </div>
            <div className="tw-row">
              <div className="tw-label">Sidebar width</div>
              <select value={tweaks.sidebarWidth} onChange={e => handleTweak('sidebarWidth', +e.target.value)}>
                <option value="200">Compact</option>
                <option value="220">Default</option>
                <option value="260">Wide</option>
              </select>
            </div>
            <div className="tw-row">
              <div className="tw-label">Density</div>
              <select value={tweaks.density} onChange={e => handleTweak('density', e.target.value)}>
                <option value="compact">Compact</option>
                <option value="normal">Normal</option>
                <option value="spacious">Spacious</option>
              </select>
            </div>
          </div>
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
